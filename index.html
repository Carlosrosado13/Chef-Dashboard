<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chef Dashboard</title>
  <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css" />
  <!-- Data files containing ingredient and menu information -->
  <script src="data.js"></script>
  <!-- Append placeholder categories for Weeks 3 and 4 -->
  <script src="data_add.js"></script>
  <script src="menu_overview.js"></script>
  <script src="lunch_menu_data.js"></script>
  <script src="dinner_menu_data.js"></script>
  <script>
    (function loadRecipeScriptsWithVersion() {
      var version = String(Date.now());
      document.write('<script src="recipeslunch.js?v=' + version + '"><\\/script>');
      document.write('<script src="recipes.js?v=' + version + '"><\\/script>');
    })();
  </script>
  <!-- Additional recipe details for Weeks 3 and 4 -->
  <script src="recipes_add.js"></script>
</head>
<body>
  <header class="brand-header">
    <div class="header-inner">
      <p class="brand-kicker">Vista on the Sparks</p>
      <h1>Weekly Menu Ingredient Planner</h1>
      <p class="brand-subtitle">Chef Dashboard</p>
    </div>
  </header>

  <main class="dashboard-shell">
    <section class="controls-row" aria-label="Dashboard filters and views">
      <nav class="meal-tabs" aria-label="Meal type">
        <button id="dinnerMealTab" class="tab-button active">Dinner</button>
        <button id="lunchMealTab" class="tab-button">Lunch</button>
      </nav>

      <nav class="top-tabs" aria-label="Dashboard views">
        <button id="recipeTab" class="tab-button active">Recipe Search</button>
        <button id="ingredientTab" class="tab-button">Ingredients Checker</button>
        <button id="weeklyTab" class="tab-button">Weekly View</button>
        <button id="updateTab" class="tab-button">Update Recipes</button>
      </nav>

      <section class="controls" aria-label="Filter controls">
        <label for="weekSelect">Week:</label>
        <select id="weekSelect"></select>

        <div id="dayFilterGroup" class="day-filter-group">
          <label for="daySelect">Day:</label>
          <select id="daySelect"></select>
        </div>
      </section>

      <section class="export-controls" aria-label="Ingredient export downloads">
        <label for="exportWeekSelect">Export Week:</label>
        <select id="exportWeekSelect">
          <option value="1">Week 1</option>
          <option value="2">Week 2</option>
          <option value="3">Week 3</option>
          <option value="4">Week 4</option>
        </select>
        <button id="downloadLunchIngredientsBtn" type="button" class="tab-button">Download Lunch Ingredients</button>
        <button id="downloadDinnerIngredientsBtn" type="button" class="tab-button">Download Dinner Ingredients</button>
        <button id="downloadLunchGroceryBtn" type="button" class="tab-button">Download Grocery List (Lunch)</button>
        <button id="downloadDinnerGroceryBtn" type="button" class="tab-button">Download Grocery List (Dinner)</button>
        <button id="downloadCombinedGroceryBtn" type="button" class="tab-button">Download Grocery List (Combined)</button>
        <button id="downloadCombinedInventoryMissingBtn" type="button" class="tab-button">Download Missing From Inventory (Combined JSON)</button>
      </section>
    </section>

    <section id="recipesView" class="layout-grid tab-content active" data-mobile-view="recipes">
      <section class="recipes-panel" aria-label="Recipe search panel">
        <div id="menuRow" class="menu-row"></div>
        <div id="recipeDetails" class="recipe-details"></div>
      </section>

      <aside class="ingredients-panel" aria-label="Ingredients checker panel">
        <div class="ingredients-panel-header">
          <h2>Ingredients Checker</h2>
          <div class="ingredients-search">
            <label id="searchLabel" for="searchInput">Search:</label>
            <input type="text" id="searchInput" placeholder="Filter ingredients..." />
          </div>
        </div>
        <div id="ingredientsContainer"></div>
      </aside>
    </section>

    <section id="ingredientsView" class="tab-content" aria-hidden="true"></section>

    <section id="weeklyView" class="tab-content" aria-hidden="true">
      <div id="weeklyMenuGrid" class="weekly-menu-grid"></div>
    </section>

    <section id="updateView" class="tab-content" aria-hidden="true">
      <section class="update-panel" aria-label="Update recipes admin">
        <h2>Update Recipes</h2>
        <div class="update-grid">
          <label for="adminApiBase">Extract API Base URL</label>
          <input type="url" id="adminApiBase" placeholder="https://your-worker.example.workers.dev" />

          <label for="updateMenuSelect">Menu</label>
          <select id="updateMenuSelect">
            <option value="dinner">Dinner</option>
            <option value="lunch">Lunch</option>
          </select>

          <label for="updateWeekSelect">Week</label>
          <select id="updateWeekSelect">
            <option value="1">Week 1</option>
            <option value="2">Week 2</option>
            <option value="3">Week 3</option>
            <option value="4">Week 4</option>
          </select>

          <label for="updateDaySelect">Day</label>
          <select id="updateDaySelect">
            <option value="Monday">Mon</option>
            <option value="Tuesday">Tue</option>
            <option value="Wednesday">Wed</option>
            <option value="Thursday">Thu</option>
            <option value="Friday">Fri</option>
            <option value="Saturday">Sat</option>
            <option value="Sunday">Sun</option>
          </select>

          <label for="updateDishSelect">Dish Slot</label>
          <select id="updateDishSelect"></select>

          <label for="recipeUrlInput">Recipe URL</label>
          <input type="url" id="recipeUrlInput" placeholder="https://example.com/recipe" />
        </div>

        <div class="update-actions">
          <button id="extractPreviewBtn" type="button" class="tab-button active">Extract & Preview</button>
          <button id="applyUpdateBtn" type="button" class="tab-button">Apply Update</button>
          <button id="downloadPatchBtn" type="button" class="tab-button">Download Patch JSON</button>
        </div>

        <p id="updateStatus" class="update-status" aria-live="polite"></p>

        <section class="preview-block">
          <h3>Extracted Recipe Preview</h3>
          <div id="previewTitle"></div>
          <div id="previewIngredients"></div>
          <div id="previewSteps"></div>
          <h4>Generated Site Format (HTML)</h4>
          <pre id="previewGenerated"></pre>
        </section>
      </section>
    </section>
  </main>

  <!-- Main script -->
  <script src="script.js"></script>
</body>
</html>
