name: Apply Recipe Patch

on:
  workflow_dispatch:
    inputs:
      patch_b64:
        description: Base64-encoded patch JSON payload
        required: true
        type: string

permissions:
  contents: write

jobs:
  apply-recipe-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Decode Patch Payload
        run: |
          echo "${{ github.event.inputs.patch_b64 }}" | base64 --decode > /tmp/recipe_patch.json
          node -e "JSON.parse(require('fs').readFileSync('/tmp/recipe_patch.json','utf8'));"

      - name: Apply Recipe Patch
        run: node scripts/applyRecipePatch.js /tmp/recipe_patch.json

      - name: Smoke Validate Recipe Data
        run: node scripts/smokeRecipesLoad.js

      - name: Commit and Push
        run: |
          if git diff --quiet; then
            echo "No changes detected after patch apply."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No staged changes."
            exit 0
          fi
          git commit -m "Apply recipe patch via workflow"
          git push
